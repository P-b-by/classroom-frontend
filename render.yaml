services:
  - type: web_service
    name: classroom-backend
    env: node
    branch: main
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        value: replace-with-a-random-secret
      - key: ADMIN_PASSWORD
        value: replace-with-a-strong-password
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-url.vercel.app
      - key: COOKIE_SAME_SITE
        value: none
      - key: TRUST_PROXY
        value: "1"

  - type: static_site
    name: classroom-frontend
    env: static
    branch: main
    buildCommand: npm run build
    staticPublishPath: dist
    plan: starter
    envVars:
      - key: VITE_API_URL
        value: https://your-backend-url.onrender.com
