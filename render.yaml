services:
  - type: web_service
    name: domas-ventures
    env: node
    branch: main
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        value: replace-with-a-random-secret
      - key: ADMIN_PASSWORD
        value: replace-with-a-strong-password
      - key: CORS_ALLOWED_ORIGINS
        value: https://domasventures.onrender.com
      - key: COOKIE_SAME_SITE
        value: none
      - key: TRUST_PROXY
        value: "1"
